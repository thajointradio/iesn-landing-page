<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 678 200" width="678" height="200">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#002d56;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d72;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd24d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5b301;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="678" height="200" fill="#ffffff" rx="0"/>

  <!-- Left icon block -->
  <rect x="0" y="0" width="200" height="200" fill="url(#navyGrad)"/>

  <!-- Stadium arch lines (broadcast/live feel) -->
  <!-- Outer arc -->
  <path d="M 65 148 A 75 75 0 0 1 135 148" fill="none" stroke="url(#goldGrad)" stroke-width="10" stroke-linecap="round"/>
  <!-- Middle arc -->
  <path d="M 78 148 A 54 54 0 0 1 122 148" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round"/>
  <!-- Inner arc -->
  <path d="M 91 148 A 34 34 0 0 1 109 148" fill="none" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round"/>

  <!-- Live dot -->
  <circle cx="100" cy="148" r="8" fill="#f5b301"/>

  <!-- LIVE pill badge -->
  <rect x="68" y="56" width="64" height="24" rx="4" fill="#c8102e"/>
  <text x="100" y="73" font-family="Arial Black, Arial, sans-serif" font-size="13" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">LIVE</text>

  <!-- Vertical divider -->
  <rect x="200" y="20" width="3" height="160" fill="#f5b301" rx="1.5"/>

  <!-- Right side text block -->
  <!-- LIVE EVENTS -->
  <text x="228" y="88" font-family="Arial Black, Arial, sans-serif" font-size="44" font-weight="900" fill="#002d56" letter-spacing="-1">LIVE EVENTS</text>

  <!-- Thin rule -->
  <rect x="228" y="100" width="420" height="3" fill="#f5b301" rx="1.5"/>

  <!-- & STREAMING -->
  <text x="230" y="148" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#597b9e" letter-spacing="4">&#38; STREAMING</text>

  <!-- Decorative dots -->
  <circle cx="228" cy="170" r="4" fill="#f5b301"/>
  <circle cx="244" cy="170" r="4" fill="#597b9e" opacity="0.5"/>
  <circle cx="260" cy="170" r="4" fill="#597b9e" opacity="0.25"/>
</svg>
